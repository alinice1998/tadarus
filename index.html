<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#042f2e">
    <meta name="description" content="الحلقات الأسرية - تطبيق حلقة تحفيظ القرآن الأسرية">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>الحلقات الأسرية - تسجيل الدخول</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">📖</div>
            <h1>الحلقات الأسرية</h1>
            <p class="subtitle">حلقة تحفيظ القرآن الأسرية</p>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group mb-3">
                    <label class="form-label" for="username">اسم المستخدم (ولي الأمر أو الابن)</label>
                    <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required
                        autocomplete="username">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="loginText">دخول</span>
                    <div class="spinner" id="loginSpinner"
                        style="display:none; margin:0; width:20px; height:20px; border-width:2px; border-top-color:#1a1a1a;">
                    </div>
                </button>
            </form>

            <form id="registerForm" autocomplete="off" style="display:none;">
                <div class="form-group mb-3">
                    <label class="form-label" for="regUsername">اسم المستخدم</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="اختر اسم مستخدم" required
                        autocomplete="username">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="regPassword">كلمة المرور</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="اختر كلمة مرور" required
                        autocomplete="new-password">
                </div>
                <button type="submit" class="btn-login" id="btnRegister">
                    <span id="regText">إنشاء حساب</span>
                    <div class="spinner" id="regSpinner"
                        style="display:none; margin:0; width:20px; height:20px; border-width:2px; border-top-color:#1a1a1a;">
                    </div>
                </button>
            </form>

            <div class="text-center mt-3">
                <button type="button" class="btn btn-link shadow-none text-white text-decoration-none"
                    id="toggleFormBtn" style="font-size: 0.9rem;">إنشاء حساب ولي أمر جديد</button>
            </div>

            <p style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.8rem; margin-top:20px;">
                إصدار ١.٠ | تطبيق ويب تقدمي
            </p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="app-toast-container" id="toastContainer"></div>

    <script>
        const API_URL = 'api.php';

        // Check if already logged in
        (async function checkAuth() {
            try {
                const res = await fetch(`${API_URL}?action=check_auth`);
                const data = await res.json();
                if (data.authenticated && data.user) {
                    localStorage.setItem('tadarus_user', JSON.stringify(data.user));
                    redirectByRole(data.user.role);
                }
            } catch (e) {
                // Check localStorage for offline
                const cached = localStorage.getItem('tadarus_user');
                if (cached) {
                    const user = JSON.parse(cached);
                    redirectByRole(user.role);
                }
            }
        })();

        function redirectByRole(role) {
            window.location.href = role === 'admin' ? 'admin.html' : 'student.html';
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btnText = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');

            errorEl.style.display = 'none';
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            try {
                const res = await fetch(`${API_URL}?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success && data.user) {
                    localStorage.setItem('tadarus_user', JSON.stringify(data.user));
                    localStorage.setItem('tadarus_last_sync', new Date().toISOString());
                    redirectByRole(data.user.role);
                } else {
                    errorEl.textContent = data.error || 'خطأ في تسجيل الدخول';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'فشل الاتصال بالخادم. تحقق من الإنترنت.';
                errorEl.style.display = 'block';
            }

            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        });

        // Form toggle logic
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        let isLoginMode = true;

        toggleFormBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('loginError').style.display = 'none';
            if (isLoginMode) {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleFormBtn.textContent = 'إنشاء حساب ولي أمر جديد';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleFormBtn.textContent = 'العودة لتسجيل الدخول';
            }
        });

        // Register form logic
        registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('loginError');
            const btnText = document.getElementById('regText');
            const spinner = document.getElementById('regSpinner');

            errorEl.style.display = 'none';
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            try {
                const res = await fetch(`${API_URL}?action=register_parent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    // Force re-check to get full user object and redirect
                    const authRes = await fetch(`${API_URL}?action=check_auth`);
                    const authData = await authRes.json();
                    if (authData.authenticated) {
                        localStorage.setItem('tadarus_user', JSON.stringify(authData.user));
                        localStorage.setItem('tadarus_last_sync', new Date().toISOString());
                        redirectByRole(authData.user.role);
                    } else {
                        window.location.href = 'admin.html';
                    }
                } else {
                    errorEl.textContent = data.error || 'خطأ في إنشاء الحساب';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'فشل الاتصال بالخادم. تحقق من الإنترنت.';
                errorEl.style.display = 'block';
            }

            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>

</html>
